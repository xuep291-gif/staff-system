            templateParam: '{"code": "%s"}'
          - operation: matchSucceed
            templateContent: '【元咕咕】恭喜您匹配成功，请在2小时内登录进行处理'
          - operation: successful
            templateContent: '【元咕咕】恭喜您对方已经完成处理，请您即刻登录核实'
