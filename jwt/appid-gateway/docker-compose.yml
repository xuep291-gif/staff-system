# Appid Gateway - Docker Compose 配置
version: '3.8'

services:
  # Appid Gateway 服务
  appid-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appid-gateway
    ports:
      - "8081:8081"
    volumes:
      # 挂载配置文件（热更新）
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./lua:/app/lua:ro
      - ./conf:/app/conf:ro
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - NGINX_WORKER_PROCESSES=auto
    networks:
      - appid-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 示例后端服务（用于测试）
  backend-demo:
    image: kennethreitz/httpbin
    container_name: backend-demo
    ports:
      - "8080:80"
    networks:
      - appid-network
    restart: unless-stopped

networks:
  appid-network:
    driver: bridge

volumes:
  logs:
    driver: local
