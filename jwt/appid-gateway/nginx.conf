# Appid Gateway - OpenResty Configuration
# 用于业务层数据隔离的 API 网关
# 通过路由前缀转发请求并注入 X-APPID-KEY header

worker_processes auto;
error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # 基础配置
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    underscores_in_headers on;

    # Lua 模块路径
    lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/openresty/lua/?.lua;/app/lua/?.lua;;";
    lua_code_cache on;

    # 共享内存字典 - 用于缓存 appid 配置
    lua_shared_dict appid_cache 10m;
    lua_shared_dict appid_locks 1m;

    # 初始化阶段 - 加载 appid 配置
    init_by_lua_block {
        -- 加载 appid 配置模块
        local appid_config = require "appid_config"
        appid_config.load()

        -- 记录初始化日志
        ngx.log(ngx.NOTICE, "Appid Gateway initialized successfully")
    }

    # 后端服务器配置
    upstream backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_appid_key" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log logs/access.log main;

    # 主服务块
    server {
        listen 8081;
        server_name _;

        # 健康检查端点
        location = /health {
            access_log off;
            content_by_lua_block {
                ngx.say("Appid Gateway is running")
                ngx.exit(ngx.HTTP_OK)
            }
        }

        # Appid 配置管理端点
        location = /admin/appids {
            allow 127.0.0.1;
            deny all;
            content_by_lua_block {
                local appid_config = require "appid_config"
                local cjson = require "cjson"

                local method = ngx.req.get_method()

                if method == "GET" then
                    -- 获取所有 appid 配置
                    local appids = appid_config.list()
                    ngx.say(cjson.encode(appids))
                elseif method == "POST" then
                    -- 添加或更新 appid 配置
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data()
                    local data = cjson.decode(body)

                    if not data.appid or not data.secret then
                        ngx.status = ngx.HTTP_BAD_REQUEST
                        ngx.say("Missing required fields: appid, secret")
                        return
                    end

                    appid_config.add(data.appid, data.secret, data.validity_days)
                    ngx.say("OK")
                elseif method == "DELETE" then
                    -- 删除 appid 配置
                    local uri_args = ngx.req.get_uri_args()
                    local appid = uri_args.appid

                    if not appid then
                        ngx.status = ngx.HTTP_BAD_REQUEST
                        ngx.say("Missing appid parameter")
                        return
                    end

                    appid_config.remove(appid)
                    ngx.say("OK")
                else
                    ngx.status = ngx.HTTP_NOT_ALLOWED
                    ngx.say("Method not allowed")
                end
            }
        }

        # 路由前缀转发
        # 匹配模式: /{route_prefix}/{path}
        # 例如: /app-a/api/health -> /api/health (携带 app-a 的 X-APPID-KEY)
        location ~ ^/([^/]+)(/.*)$ {
            # 提取路由前缀和目标路径
            set $route_prefix $1;
            set $target_path $2;

            # 访问阶段 - 注入 X-APPID-KEY 并转发
            access_by_lua_block {
                local proxy = require "proxy"

                -- 获取路由前缀
                local route_prefix = ngx.var.route_prefix
                if not route_prefix or route_prefix == "" then
                    ngx.log(ngx.WARN, "No route prefix found")
                    ngx.status = ngx.HTTP_BAD_REQUEST
                    ngx.say("Invalid route")
                    ngx.exit(ngx.HTTP_BAD_REQUEST)
                    return
                end

                -- 检查路由前缀是否配置了 appid
                local appid_config = require "appid_config"
                local config = appid_config.get_by_route(route_prefix)

                if not config then
                    ngx.log(ngx.WARN, "No appid config found for route: ", route_prefix)
                    -- 如果没有配置，直接转发（不注入 X-APPID-KEY）
                    return
                end

                -- 生成 X-APPID-KEY
                local appid_key = proxy.generate_appid_key(config.appid, config.secret)
                if not appid_key then
                    ngx.log(ngx.ERR, "Failed to generate X-APPID-KEY for appid: ", config.appid)
                    ngx.status = ngx.HTTP_INTERNAL_SERVER_ERROR
                    ngx.say("Failed to generate authentication key")
                    ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
                    return
                end

                -- 注入 X-APPID-KEY header
                ngx.req.set_header("X-APPID-KEY", appid_key)
                ngx.log(ngx.INFO, "Injected X-APPID-KEY for appid: ", config.appid, ", route: ", route_prefix)
            }

            # 代理到后端
            proxy_pass http://backend$target_path;

            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # 默认 location - 直接转发（不带 appid）
        location / {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
