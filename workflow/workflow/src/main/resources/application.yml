  file:
    name: logs/workflow-listener-failure.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"


account:
  password:
    policy: MEDIUM  # [LOW, MEDIUM, STRONG]
    policies:
      LOW:
        length: 6
        digit-char-count: 0
        mixed-case-count: 0
        special-char-count: 0
        capitalize: 0
      MEDIUM:
        length: 6
        digit-char-count: 2
        mixed-case-count: 0
        special-char-count: 0
        capitalize: 0
      STRONG:
        length: 8
        digit-char-count: 2
        mixed-case-count: 1
        special-char-count: 1
        capitalize: 1

